name: Build Single Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Select image to build'
        required: true
        type: choice
        options:
          - warp
          - openconnect
      tag:
        description: 'Image tag'
        required: true
        default: 'latest'
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load build.env
        run: |
          source ${{ inputs.image }}/build.env
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "PLATFORMS=${PLATFORMS:-linux/amd64,linux/arm64}" >> $GITHUB_ENV
          echo "DATE_TAG=$(date +'%Y.%m')" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ inputs.image }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            # ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.DATE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            # ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.DATE_TAG }}